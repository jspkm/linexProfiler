<svg width="32" height="32" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Linex Animated Logo - for loading/working states -->
  
  <defs>
    <linearGradient id="linexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="50%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
  </defs>
  
  <g transform-origin="32 32">
    <!-- Rotating outer rays group -->
    <g>
      <animateTransform 
        attributeName="transform" 
        type="rotate" 
        from="0 32 32" 
        to="360 32 32" 
        dur="8s" 
        repeatCount="indefinite"/>
      
      <!-- Main rays -->
      <path d="M32 27 Q33 20 32 10 Q31 20 32 27" fill="url(#linexGrad)"/>
      <path d="M35 29 Q40 24 46 16 Q38 25 35 29" fill="url(#linexGrad)"/>
      <path d="M37 32 Q44 31 54 32 Q44 33 37 32" fill="url(#linexGrad)"/>
      <path d="M35 35 Q40 40 46 48 Q38 39 35 35" fill="url(#linexGrad)"/>
      <path d="M32 37 Q33 44 32 54 Q31 44 32 37" fill="url(#linexGrad)"/>
      <path d="M29 35 Q24 40 18 48 Q26 39 29 35" fill="url(#linexGrad)"/>
      <path d="M27 32 Q20 31 10 32 Q20 33 27 32" fill="url(#linexGrad)"/>
      <path d="M29 29 Q24 24 18 16 Q26 25 29 29" fill="url(#linexGrad)"/>
      
      <!-- Tip nodes -->
      <circle cx="32" cy="10" r="2" fill="url(#linexGrad)"/>
      <circle cx="46" cy="16" r="1.5" fill="url(#linexGrad)"/>
      <circle cx="54" cy="32" r="2" fill="url(#linexGrad)"/>
      <circle cx="46" cy="48" r="1.5" fill="url(#linexGrad)"/>
      <circle cx="32" cy="54" r="2" fill="url(#linexGrad)"/>
      <circle cx="18" cy="48" r="1.5" fill="url(#linexGrad)"/>
      <circle cx="10" cy="32" r="2" fill="url(#linexGrad)"/>
      <circle cx="18" cy="16" r="1.5" fill="url(#linexGrad)"/>
    </g>
    
    <!-- Pulsing center node -->
    <circle cx="32" cy="32" r="5" fill="url(#linexGrad)">
      <animate 
        attributeName="r" 
        values="4;6;4" 
        dur="1.5s" 
        repeatCount="indefinite"/>
      <animate 
        attributeName="opacity" 
        values="1;0.7;1" 
        dur="1.5s" 
        repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
